<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Annuaire des Membres - Noms & Numéros</title>
  <!-- Google Fonts pour un style moderne -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (gratuit) pour icônes légères -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #073332;
      font-family: 'Inter', sans-serif;
      padding: 2rem 1.5rem;
      color: #e0e8e8;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* En-tête */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ffffff, #9ec8d9);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 i {
      background: none;
      color: #7ec8c8;
      font-size: 2rem;
    }

    .sub {
      color: #9ec8c8;
      margin-top: 0.5rem;
      font-weight: 500;
      font-size: 0.95rem;
      border-top: 1px solid #1a5a58;
      display: inline-block;
      padding-top: 0.7rem;
    }

    /* barre de recherche */
    .search-bar {
      background: #0a4a48;
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      margin-bottom: 2rem;
      border: 1px solid #1a6a68;
    }

    .search-bar i {
      color: #7ec8c8;
      font-size: 1.2rem;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      padding: 12px 0;
      background: transparent;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
    }

    .search-bar input::placeholder {
      color: #7aaeae;
    }

    /* compteur et rafraîchissement */
    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .counter {
      background: #0a4a48;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #9ec8c8;
    }

    .refresh-btn {
      background: #0a4a48;
      border: 1px solid #1a6a68;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #9ec8c8;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
    }

    .refresh-btn:hover {
      background: #1a6a68;
      color: #ffffff;
      transform: scale(0.97);
    }

    /* grille membres */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.3rem;
    }

    /* carte membre */
    .member-card {
      background: #0d4240;
      border-radius: 24px;
      padding: 1.2rem 1.5rem;
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), 0 2px 6px rgba(0, 0, 0, 0.2);
      border: 1px solid #1a6a68;
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .member-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.4);
      border-color: #2a8a88;
      background: #125856;
    }

    .avatar-icon {
      background: #1a6a68;
      width: 52px;
      height: 52px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ec8c8;
      font-size: 1.7rem;
      flex-shrink: 0;
    }

    .member-info {
      flex: 1;
    }

    .member-name {
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.2px;
      color: #ffffff;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .member-name .fullname {
      word-break: break-word;
    }

    /* Section téléphone + boutons */
    .phone-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .member-phone {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a6a68;
      padding: 6px 12px;
      border-radius: 32px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #b8e4e4;
    }

    .member-phone i {
      font-size: 0.75rem;
      color: #7ec8c8;
    }

    .no-phone {
      color: #8aaeae;
      font-style: italic;
      font-size: 0.8rem;
    }

    /* Boutons d'action */
    .action-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .action-btn {
      background: #1a6a68;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #b8e4e4;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .action-btn:hover {
      transform: scale(1.08);
      background: #2a8a88;
      color: #ffffff;
    }

    .whatsapp-btn:hover {
      background: #25D366;
      color: white;
    }

    .call-btn:hover {
      background: #34B7F1;
      color: white;
    }

    .sms-btn:hover {
      background: #FF9800;
      color: white;
    }

    /* Désactivé si pas de numéro */
    .action-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* État vide */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      background: #0d4240;
      border-radius: 2rem;
      margin-top: 1rem;
      border: 1px dashed #2a8a88;
    }

    .empty-state i {
      font-size: 3rem;
      color: #2a8a88;
      margin-bottom: 1rem;
    }

    .empty-state p {
      color: #9ec8c8;
    }

    /* loader */
    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 3rem;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #1a6a68;
      border-top: 3px solid #7ec8c8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #7aaeae;
    }

    @media (max-width: 650px) {
      body {
        padding: 1.2rem;
      }
      .member-card {
        padding: 1rem 1.2rem;
        flex-wrap: wrap;
      }
      .member-info {
        min-width: 0;
      }
      .phone-actions {
        flex-direction: column;
        align-items: flex-start;
      }
      .members-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>
      <i class="fas fa-address-book"></i> 
      Annuaire membres
    </h1>
    <div class="sub">Noms & numéros de téléphone</div>
  </div>

  <div class="search-bar">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Rechercher par nom, prénom ou numéro..." autocomplete="off">
  </div>

  <div class="info-panel">
    <span class="counter" id="memberCounter">— membre(s)</span>
    <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Actualiser</button>
  </div>

  <div id="membersContainer">
    <div class="loader"><div class="spinner"></div></div>
  </div>
  <footer>
    <i class="fab fa-whatsapp"></i> WhatsApp • 
    <i class="fas fa-phone"></i> Appel • 
    <i class="fas fa-envelope"></i> SMS
  </footer>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Configuration Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyA-TpblN0YnekG2tKFRhjOwwEd80qke5pk",
    authDomain: "ansar-69617.firebaseapp.com",
    projectId: "ansar-69617",
    storageBucket: "ansar-69617.firebasestorage.app",
    messagingSenderId: "1075104578958",
    appId: "1:1075104578958:web:b5d55c76def4d1d430b8df",
    measurementId: "G-5XLSPLXH81"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const membersCollection = collection(db, "members");

  let allMembers = [];
  let filterText = "";

  // Nettoyer un numéro de téléphone (enlève espaces, tirets, etc.)
  function cleanPhoneNumber(phone) {
    if (!phone) return '';
    // Garde uniquement les chiffres et le signe +
    let cleaned = phone.toString().replace(/[^\d+]/g, '');
    // Si le numéro commence par 0 et n'a pas d'indicatif, on ajoute +221 (Sénégal par défaut)
    // Mais on laisse tel quel, les liens fonctionneront avec le numéro brut
    return cleaned;
  }

  // Construire nom complet
  function buildFullName(memberData, docId) {
    let first = memberData.firstname || "";
    let last = memberData.lastname || "";
    if (first.trim() || last.trim()) {
      return `${first} ${last}`.trim();
    }
    if (memberData.name && typeof memberData.name === "string") return memberData.name.trim();
    return `Membre ${docId.slice(0,6)}`;
  }

  // Extraire numéro
  function extractPhone(memberData) {
    if (memberData.phone && typeof memberData.phone === "string" && memberData.phone.trim() !== "") {
      return memberData.phone.trim();
    }
    if (memberData.telephone && typeof memberData.telephone === "string" && memberData.telephone.trim() !== "") {
      return memberData.telephone.trim();
    }
    if (memberData.mobile && typeof memberData.mobile === "string" && memberData.mobile.trim() !== "") {
      return memberData.mobile.trim();
    }
    return null;
  }

  // Générer les boutons d'action
  function getActionButtons(phoneNumber) {
    if (!phoneNumber) {
      return `
        <div class="action-buttons">
          <span class="action-btn disabled"><i class="fab fa-whatsapp"></i></span>
          <span class="action-btn disabled"><i class="fas fa-phone"></i></span>
          <span class="action-btn disabled"><i class="fas fa-comment"></i></span>
        </div>
      `;
    }
    
    const cleanPhone = cleanPhoneNumber(phoneNumber);
    // WhatsApp (même numéro propre)
    const whatsappUrl = `https://wa.me/${cleanPhone}`;
    // Appel (tel:)
    const callUrl = `tel:${cleanPhone}`;
    // SMS (sms:)
    const smsUrl = `sms:${cleanPhone}`;
    
    return `
      <div class="action-buttons">
        <a href="${whatsappUrl}" target="_blank" class="action-btn whatsapp-btn" title="WhatsApp">
          <i class="fab fa-whatsapp"></i>
        </a>
        <a href="${callUrl}" class="action-btn call-btn" title="Appeler">
          <i class="fas fa-phone"></i>
        </a>
        <a href="${smsUrl}" class="action-btn sms-btn" title="Envoyer un SMS">
          <i class="fas fa-comment"></i>
        </a>
      </div>
    `;
  }

  // Filtrer et afficher
  function filterAndRender() {
    const container = document.getElementById("membersContainer");
    if (!container) return;

    const searchLower = filterText.toLowerCase().trim();
    let filtered = [...allMembers];

    if (searchLower !== "") {
      filtered = filtered.filter(member => {
        const nameMatch = member.fullName.toLowerCase().includes(searchLower);
        const phoneMatch = member.phoneNumber && member.phoneNumber.toLowerCase().includes(searchLower);
        return nameMatch || phoneMatch;
      });
    }

    const counterSpan = document.getElementById("memberCounter");
    if (counterSpan) {
      counterSpan.textContent = `${filtered.length} membre(s)`;
    }

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-user-slash"></i>
          <p>Aucun membre ne correspond à votre recherche.<br>Essayez un autre nom ou numéro.</p>
        </div>
      `;
      return;
    }

    const cardsHTML = filtered.map(member => {
      const phoneDisplay = member.phoneNumber 
        ? `<span class="member-phone"><i class="fas fa-phone-alt"></i> ${member.phoneNumber}</span>` 
        : `<span class="member-phone no-phone"><i class="fas fa-phone-slash"></i> Non renseigné</span>`;
      
      const actionButtons = getActionButtons(member.phoneNumber);
      const initial = member.fullName.charAt(0).toUpperCase() || "?";
      
      return `
        <div class="member-card" data-id="${member.id}">
          <div class="avatar-icon">
            <span style="font-weight:600; font-size:1.3rem;">${escapeHtml(initial)}</span>
          </div>
          <div class="member-info">
            <div class="member-name">
              <span class="fullname">${escapeHtml(member.fullName)}</span>
            </div>
            <div class="phone-actions">
              ${phoneDisplay}
              ${actionButtons}
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    container.innerHTML = `<div class="members-grid">${cardsHTML}</div>`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Charger les membres
  async function loadMembers() {
    const container = document.getElementById("membersContainer");
    container.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
    
    try {
      const querySnapshot = await getDocs(membersCollection);
      const membersList = [];
      
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const docId = doc.id;
        
        const fullName = buildFullName(data, docId);
        const phoneNumber = extractPhone(data);
        
        membersList.push({
          id: docId,
          fullName: fullName,
          phoneNumber: phoneNumber,
        });
      });
      
      membersList.sort((a, b) => a.fullName.localeCompare(b.fullName));
      allMembers = membersList;
      filterAndRender();
    } catch (error) {
      console.error("Erreur Firebase:", error);
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle"></i>
          <p>Impossible de charger les données.<br>${error.message}</p>
        </div>
      `;
    }
  }

  function setupSearch() {
    const searchInput = document.getElementById("searchInput");
    if (searchInput) {
      searchInput.addEventListener("input", (e) => {
        filterText = e.target.value;
        filterAndRender();
      });
    }
  }
  
  function init() {
    setupSearch();
    loadMembers();
    const refreshBtn = document.getElementById("refreshBtn");
    if (refreshBtn) {
      refreshBtn.addEventListener("click", () => loadMembers());
    }
  }
  
  init();
</script>
</body>
</html>
